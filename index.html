<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐀皇帝之日志</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background-color: #f0f8f0;
            background-image: 
                linear-gradient(rgba(155,187,89,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(155,187,89,0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .art-border {
            position: relative;
        }
        .art-border::before, .art-border::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid rgb(155,187,89);
        }
        .art-border::before {
            top: 10px; left: 10px;
            border-right: none; border-bottom: none;
        }
        .art-border::after {
            bottom: 10px; right: 10px;
            border-left: none; border-top: none;
        }
        .log-card {
            transition: all 0.3s ease;
            border: 1px solid rgba(155,187,89,0.2);
            position: relative;
            overflow: hidden;
        }
        .log-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 4px; height: 100%;
            background: linear-gradient(to bottom, rgb(155,187,89), rgba(155,187,89,0.3));
        }
        .log-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 28px -8px rgba(155, 187, 89, 0.2);
        }
        .bg-custom { background-color: rgb(155,187,89); }
        .text-custom { color: rgb(155,187,89); }
        .border-custom { border-color: rgb(155,187,89); }
        .bg-custom-light { background-color: rgba(155,187,89,0.1); }
        .text-custom-dark { color: rgba(110, 130, 60, 0.9); }
        .hover\:bg-custom-hover:hover { background-color: rgba(155,187,89,0.8); }
        .seal {
            display: inline-block; padding: 2px 8px;
            border: 1px solid rgb(155,187,89); border-radius: 4px;
            font-size: 12px; color: rgb(155,187,89);
            margin-left: 8px; transform: rotate(-3deg);
        }
        .letter-paper-container {
            background-color: #fffdf8;
            background-image: 
                linear-gradient(90deg, transparent 24px, #f0e6d2 24px, #f0e6d2 26px, transparent 26px),
                linear-gradient(#e8e0d0 1px, transparent 1px);
            background-size: 100% 32px;
            padding: 40px 50px;
            border: 1px solid #e0d8c8;
            box-shadow: 0 2px 15px rgba(155,187,89,0.1);
            width: 100%; min-height: 900px;
            position: relative;
        }
        .letter-paper-container textarea {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            background: transparent; border: none; outline: none; resize: none;
            padding: 40px 50px;
            font-family: "楷体", "SimKai", serif;
            font-size: 18px; line-height: 32px; letter-spacing: 1px;
            color: #222; white-space: pre-wrap; overflow-y: auto;
        }
        .catalog-item { transition: all 0.2s ease; cursor: pointer; }
        .catalog-item:hover { background-color: rgba(155,187,89,0.05); }
        .subcatalog-item {
            border-left: 2px solid rgb(155,187,89);
            margin-left: 15px; padding-left: 15px; cursor: pointer;
        }
        .modal-backdrop { backdrop-filter: blur(6px); }
    </style>
</head>
<body class="min-h-screen">

<header class="bg-custom text-white py-6 px-4 shadow-lg">
    <div class="container mx-auto">
        <h1 class="text-2xl md:text-3xl font-bold flex items-center">
            🐀皇帝之日志<span class="seal">御批</span>
        </h1>
        <p class="mt-2 text-white/80">🙇‍♂️皇上今天辛苦了🙇‍♂️</p>
    </div>
</header>

<main class="container mx-auto px-4 py-8">

    <div class="flex flex-wrap gap-2 mb-8">
        <button id="tabDailyLog" class="px-6 py-3 bg-custom text-white rounded-md hover:bg-custom-hover transition-colors font-medium">
            📜 今日鼠闻
        </button>
        <button id="tabInspiration" class="px-6 py-3 bg-white text-custom border border-custom rounded-md hover:bg-custom-light transition-colors font-medium">
            🐭 奇鼠妙想
        </button>
        <button onclick="openCloudModal()" class="px-6 py-3 bg-blue-600 text-white rounded-md hover:bg-blue-700 transition-colors font-medium">
            <i class="fas fa-cloud"></i> 云端同步
        </button>
    </div>

    <!-- 今日鼠闻 -->
    <section id="dailyLogSection">
        <section class="bg-white rounded-lg shadow-md p-6 mb-8 border border-custom/20 art-border">
            <h2 class="text-xl font-semibold mb-6 text-gray-800 flex items-center">
                <i class="fas fa-plus-circle text-custom mr-2"></i>✍史官记载……
            </h2>
            <form id="logForm" class="space-y-6">
                <div>
                    <label for="logDate" class="block text-sm font-medium text-gray-700 mb-2">日志日期</label>
                    <input type="date" id="logDate" class="w-full px-4 py-3 border border-custom/30 rounded-md focus:outline-none focus:ring-2 focus:ring-custom" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">今日心情</label>
                    <div class="flex gap-4 mt-2">
                        <button type="button" id="moodUp" class="mood-btn active bg-custom-light text-custom-dark px-6 py-3 rounded-md flex items-center gap-2">
                            <i class="fas fa-thumbs-up text-xl"></i><span>龙颜大悦</span>
                        </button>
                        <button type="button" id="moodDown" class="mood-btn bg-gray-100 text-gray-700 px-6 py-3 rounded-md flex items-center gap-2">
                            <i class="fas fa-thumbs-down text-xl"></i><span>略有不悦</span>
                        </button>
                    </div>
                </div>
                <div>
                    <label for="logContent" class="block text-sm font-medium text-gray-700 mb-2">
                        御笔亲书 
                        <button type="button" id="openEmojiPanel" class="text-custom hover:text-custom-dark ml-2">
                            <i class="fas fa-smile"></i> 御用品味
                        </button>
                    </label>
                    <div id="emojiPanel" class="hidden bg-white border border-custom/30 rounded-md p-4 mb-3 flex flex-wrap gap-3 max-h-48 overflow-y-auto">
                        <span class="emoji-item text-2xl">😊</span><span class="emoji-item text-2xl">😃</span><span class="emoji-item text-2xl">🥰</span><span class="emoji-item text-2xl">😜</span>
                        <span class="emoji-item text-2xl">😎</span><span class="emoji-item text-2xl">🤩</span><span class="emoji-item text-2xl">🥳</span><span class="emoji-item text-2xl">😌</span>
                        <span class="emoji-item text-2xl">😔</span><span class="emoji-item text-2xl">😢</span><span class="emoji-item text-2xl">🔥</span><span class="emoji-item text-2xl">✨</span>
                        <span class="emoji-item text-2xl">🌟</span><span class="emoji-item text-2xl">💖</span><span class="emoji-item text-2xl">🍀</span><span class="emoji-item text-2xl">☕</span>
                        <span class="emoji-item text-2xl">🐉</span><span class="emoji-item text-2xl">🏮</span><span class="emoji-item text-2xl">🍵</span><span class="emoji-item text-2xl">🍶</span>
                    </div>
                    <textarea id="logContent" rows="6" class="w-full px-4 py-3 border border-custom/30 rounded-md focus:outline-none focus:ring-2 focus:ring-custom" placeholder="朝政、趣事、见闻……" required></textarea>
                </div>
                <div>
                    <label for="logImage" class="block text-sm font-medium text-gray-700 mb-2">御赐图片</label>
                    <input type="file" id="logImage" accept="image/*"
                           class="w-full text-sm text-gray-500 file:mr-4 file:py-3 file:px-6 file:rounded-md file:border-0 file:bg-custom-light file:text-custom-dark">
                    <div id="imagePreviewArea" class="mt-4 hidden">
                        <p class="text-sm text-gray-600 mb-2">御览预览：</p>
                        <img id="imagePreview" class="max-h-60 object-cover rounded-md border border-custom/20">
                    </div>
                </div>
                <div class="flex flex-wrap gap-4">
                    <button type="submit" class="px-8 py-3 bg-custom text-white rounded-md hover:bg-custom-hover flex items-center gap-2">
                        <i class="fas fa-save"></i>存档入册
                    </button>
                    <button type="button" onclick="openExportModal('daily')" class="px-8 py-3 bg-custom-light text-custom-dark rounded-md hover:bg-custom/20 flex items-center gap-2">
                        <i class="fas fa-download"></i>导出御记
                    </button>
                </div>
            </form>
        </section>

        <section>
            <h2 class="text-xl font-semibold mb-6 text-gray-800 flex items-center">
                <i class="fas fa-list-alt text-custom mr-2"></i>皇家史册
            </h2>
            <div id="logList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="text-center text-gray-500 py-12" id="emptyState">
                    <i class="fas fa-file-alt text-5xl mb-4 text-custom"></i>
                    <p class="text-lg">暂无御笔记录，皇上请开始创作！</p>
                </div>
            </div>
        </section>
    </section>

    <!-- 奇鼠妙想 -->
    <section id="inspirationSection" class="hidden">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-lg shadow-md p-6 border border-custom/20 art-border h-fit">
                <h2 class="text-xl font-semibold mb-6 text-gray-800 flex items-center">
                    <i class="fas fa-folder-open text-custom mr-2"></i>卷宗
                </h2>
                <div class="flex gap-2 mb-8">
                    <input type="text" id="newCatalogName" placeholder="新增卷名称" class="flex-1 px-4 py-3 border border-custom/30 rounded-md focus:outline-none focus:ring-2 focus:ring-custom">
                    <button onclick="addCatalog()" class="px-4 py-3 bg-custom text-white rounded-md hover:bg-custom-hover">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
                <div id="catalogList" class="space-y-4 max-h-[700px] overflow-y-auto pr-2">
                    <div class="text-center text-gray-500 py-6" id="emptyCatalog">
                        <i class="fas fa-folder text-3xl mb-3 text-custom"></i>
                        <p>暂无卷宗，新增一卷吧！</p>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="bg-white rounded-lg shadow-md p-6 mb-6 border border-custom/20 art-border">
                    <h2 class="text-xl font-semibold mb-6 text-gray-800 flex items-center" id="subCatalogTitle">
                        <i class="fas fa-folder-plus text-custom mr-2"></i>请先选择一卷
                    </h2>
                    <div id="subCatalogForm" class="hidden flex gap-2 mb-8">
                        <input type="text" id="newSubCatalogName" placeholder="新增章节名称" class="flex-1 px-4 py-3 border border-custom/30 rounded-md focus:outline-none focus:ring-2 focus:ring-custom">
                        <button onclick="addSubCatalog()" class="px-4 py-3 bg-custom text-white rounded-md hover:bg-custom-hover">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>
                    <div id="subCatalogList" class="space-y-3 max-h-[250px] overflow-y-auto pr-2"></div>
                </div>

                <div class="bg-white rounded-lg shadow-md p-6 border border-custom/20 art-border">
                    <div class="flex flex-wrap justify-between items-center mb-4 gap-2">
                        <h2 class="text-xl font-semibold text-gray-800 flex items-center" id="editorTitle">
                            <i class="fas fa-pen-fancy text-custom mr-2"></i>未选择章节
                        </h2>
                        <div class="flex flex-wrap gap-2">
                            <button id="addPageBtn" class="hidden px-4 py-2 bg-custom-light text-custom-dark rounded-md hover:bg-custom/20" onclick="addPage()">
                                <i class="fas fa-file"></i> 加一页
                            </button>
                            <button id="saveInspirationBtn" onclick="saveInspiration()" class="hidden px-6 py-3 bg-custom text-white rounded-md hover:bg-custom-hover flex items-center gap-2">
                                <i class="fas fa-save"></i> 保存灵感
                            </button>
                            <button onclick="openExportModal('inspiration')" class="px-6 py-3 bg-custom-light text-custom-dark rounded-md hover:bg-custom/20 flex items-center gap-2">
                                <i class="fas fa-download"></i> 导出灵感
                            </button>
                        </div>
                    </div>
                    <div class="letter-paper-container">
                        <textarea id="inspirationEditor" placeholder="✨ 奇鼠妙想，下笔有神～"></textarea>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 导出模态框 -->
    <div id="exportModal" class="fixed inset-0 flex items-center justify-center z-50 hidden modal-backdrop">
        <div class="absolute inset-0 bg-black bg-opacity-50"></div>
        <div class="bg-white rounded-lg shadow-xl max-w-5xl w-full max-h-[90vh] overflow-y-auto p-8 relative z-10 border border-custom/20 art-border">
            <button id="closeExportModal" class="absolute top-6 right-6 text-gray-500 hover:text-gray-700"><i class="fas fa-times text-xl"></i></button>
            <h3 class="text-2xl font-bold text-gray-800 mb-6"><i class="fas fa-download text-custom mr-2"></i>导出内容</h3>
            <div id="exportContent" class="space-y-6"></div>
            <div class="mt-8 flex justify-end">
                <button onclick="exportSelectedContent()" class="px-8 py-3 bg-custom text-white rounded-md hover:bg-custom-hover flex items-center gap-2 text-lg">
                    <i class="fas fa-file-export"></i> 导出选中内容
                </button>
            </div>
        </div>
    </div>

    <!-- 云端同步模态框 -->
    <div id="cloudModal" class="fixed inset-0 flex items-center justify-center z-50 hidden modal-backdrop">
        <div class="absolute inset-0 bg-black bg-opacity-50"></div>
        <div class="bg-white rounded-lg shadow-xl max-w-lg w-full p-6 relative z-10">
            <button id="closeCloudModal" class="absolute top-4 right-4 text-gray-500 hover:text-gray-700"><i class="fas fa-times"></i></button>
            <h3 class="text-xl font-bold mb-4 flex items-center"><i class="fas fa-cloud text-blue-600 mr-2"></i>云端同步（全数据）</h3>
            <div class="space-y-3">
                <div>
                    <label class="block text-sm font-medium mb-1">GitHub Token（只开 gist 权限）</label>
                    <input type="password" id="ghToken" class="w-full px-3 py-2 border rounded" placeholder="ghp_...">
                </div>
                <button onclick="cloudBackup()" class="w-full py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                    🔗 上传：鼠闻 + 卷宗 + 章节 全量备份
                </button>
                <button onclick="cloudRestore()" class="w-full py-2 bg-green-600 text-white rounded hover:bg-green-700">
                    🔽 下载：从云端恢复全部数据
                </button>
                <p class="text-xs text-gray-500 mt-2">
                    • 所有设备用<b>同一个 GitHub 账号</b><br>
                    • 备份一次后，任意设备都可恢复<br>
                    • 恢复会<b>覆盖本地</b>，与云端完全一致
                </p>
            </div>
        </div>
    </div>

    <!-- 日志详情 -->
    <div id="logModal" class="fixed inset-0 flex items-center justify-center z-50 hidden modal-backdrop">
        <div class="absolute inset-0 bg-black bg-opacity-50"></div>
        <div class="bg-white rounded-lg shadow-xl max-w-3xl w-full max-h-[90vh] overflow-y-auto p-8 relative z-10 border border-custom/20 art-border">
            <button id="closeModal" class="absolute top-6 right-6 text-gray-500 hover:text-gray-700"><i class="fas fa-times text-xl"></i></button>
            <div id="modalContent" class="space-y-6"></div>
        </div>
    </div>

</main>

<footer class="bg-custom text-white py-6 px-4 mt-16">
    <div class="container mx-auto text-center text-sm">
        <p>🐀皇帝之日志 &copy; 2026 | 📜有事启奏，无事退朝📜</p>
    </div>
</footer>

<script>
// ========== 全局数据 ==========
let logs = JSON.parse(localStorage.getItem('dailyLogs')) || [];
let inspirations = JSON.parse(localStorage.getItem('inspirations')) || [];
let selectedMood = 'up';
let selectedCatalogId = null;
let selectedSubCatalogId = null;
let exportType = '';

const CLOUD_FILENAME = "huangdi_rizhi_data.json";

document.addEventListener('DOMContentLoaded', function(){
    // 标签切换
    const tabDailyLog = document.getElementById('tabDailyLog');
    const tabInspiration = document.getElementById('tabInspiration');
    tabDailyLog.addEventListener('click', ()=>{
        document.getElementById('dailyLogSection').classList.remove('hidden');
        document.getElementById('inspirationSection').classList.add('hidden');
    });
    tabInspiration.addEventListener('click', ()=>{
        document.getElementById('inspirationSection').classList.remove('hidden');
        document.getElementById('dailyLogSection').classList.add('hidden');
        renderCatalogs();
    });
    document.getElementById('closeCloudModal').onclick = ()=>{
        document.getElementById('cloudModal').classList.add('hidden');
    };
    document.getElementById('logDate').value = new Date().toISOString().split('T')[0];

    // 心情
    document.getElementById('moodUp').onclick = ()=>{ selectedMood='up'; };
    document.getElementById('moodDown').onclick = ()=>{ selectedMood='down'; };

    // 图片预览
    document.getElementById('logImage').addEventListener('change', e=>{
        const f = e.target.files[0];
        if(f){
            const r = new FileReader();
            r.onload = ev=>{
                document.getElementById('imagePreviewArea').classList.remove('hidden');
                document.getElementById('imagePreview').src = ev.target.result;
            };
            r.readAsDataURL(f);
        }
    });

    // 保存日志
    document.getElementById('logForm').addEventListener('submit', e=>{
        e.preventDefault();
        const date = document.getElementById('logDate').value;
        const content = document.getElementById('logContent').value;
        const file = document.getElementById('logImage').files[0];
        if(file){
            const r = new FileReader();
            r.onload = ev=>{
                saveLog(date, content, ev.target.result, selectedMood);
            };
            r.readAsDataURL(file);
        }else{
            saveLog(date, content, null, selectedMood);
        }
        alert("📜 存档成功！");
    });

    renderLogs();
    renderCatalogs();
});

// ========== 日志功能 ==========
function saveLog(date, content, image, mood){
    const item = {
        id: Date.now(), date, content, image, mood,
        createTime: new Date().toLocaleString()
    };
    logs.unshift(item);
    localStorage.setItem('dailyLogs', JSON.stringify(logs));
    renderLogs();
}
function renderLogs(){
    const list = document.getElementById('logList');
    list.innerHTML = '';
    if(logs.length === 0){
        list.appendChild(document.getElementById('emptyState'));
        return;
    }
    logs.forEach(log=>{
        const el = document.createElement('div');
        el.className = 'log-card bg-white rounded-lg shadow p-6 cursor-pointer';
        el.innerHTML = `
            <div class="flex justify-between items-start mb-4">
                <span class="text-sm font-medium text-custom bg-custom-light px-3 py-1 rounded">
                    <i class="fas fa-calendar mr-1"></i>${formatDate(log.date)}
                </span>
                <span class="text-xl ${log.mood==='up'?'text-custom':'text-gray-500'}">
                    <i class="fas fa-thumbs-${log.mood}"></i> ${log.mood==='up'?'龙颜大悦':'略有不悦'}
                </span>
            </div>
            <div class="text-gray-700 mb-6 line-clamp-4 text-lg">${log.content}</div>
            ${log.image ? `<img src="${log.image}" class="w-full h-48 object-cover rounded-md border border-custom/20">` : ''}
            <div class="flex justify-between items-center mt-4">
                <span class="text-xs text-gray-500">点击查看</span>
                <button class="del-btn text-red-500" data-id="${log.id}"><i class="fas fa-trash-alt"></i> 销毁</button>
            </div>
        `;
        el.querySelector('.del-btn').onclick = (ev)=>{
            ev.stopPropagation();
            logs = logs.filter(x=>x.id != ev.currentTarget.dataset.id);
            localStorage.setItem('dailyLogs', JSON.stringify(logs));
            renderLogs();
        };
        list.appendChild(el);
    });
}
function formatDate(s){
    return new Date(s).toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric',weekday:'long'});
}

// ========== 卷宗/章节 ==========
function addCatalog(){
    const name = document.getElementById('newCatalogName').value.trim();
    if(!name) return alert('卷名称不能为空');
    inspirations.push({id:Date.now(), name, subCatalogs:[]});
    localStorage.setItem('inspirations', JSON.stringify(inspirations));
    document.getElementById('newCatalogName').value = '';
    renderCatalogs();
}
function renderCatalogs(){
    const list = document.getElementById('catalogList');
    list.innerHTML = '';
    if(inspirations.length === 0){
        list.appendChild(document.getElementById('emptyCatalog'));
        return;
    }
    inspirations.forEach(cat=>{
        const el = document.createElement('div');
        el.className = `catalog-item p-4 rounded-md border ${selectedCatalogId===cat.id?'bg-custom-light border-custom':''}`;
        el.innerHTML = `
            <div class="flex items-center">
                <i class="fas fa-folder text-custom mr-3"></i>
                <span class="catalog-name" data-id="${cat.id}">${cat.name}</span>
            </div>
        `;
        el.querySelector('.catalog-name').onclick = ()=>{
            selectedCatalogId = cat.id;
            selectedSubCatalogId = null;
            renderSubCatalogs();
            renderCatalogs();
        };
        list.appendChild(el);
    });
}
function addSubCatalog(){
    const name = document.getElementById('newSubCatalogName').value.trim();
    if(!name) return alert('章节名称不能为空');
    const cat = inspirations.find(x=>x.id === selectedCatalogId);
    cat.subCatalogs.push({id:Date.now(), name, content:''});
    localStorage.setItem('inspirations', JSON.stringify(inspirations));
    document.getElementById('newSubCatalogName').value = '';
    renderSubCatalogs();
}
function renderSubCatalogs(){
    const list = document.getElementById('subCatalogList');
    list.innerHTML = '';
    const cat = inspirations.find(x=>x.id === selectedCatalogId);
    cat.subCatalogs.forEach(sub=>{
        const el = document.createElement('div');
        el.className = `subcatalog-item p-3 ${selectedSubCatalogId===sub.id?'bg-custom-light border-custom':''}`;
        el.innerHTML = `
            <div class="flex items-center">
                <i class="fas fa-file-alt text-custom mr-3"></i>
                <span class="sub-name" data-id="${sub.id}">${sub.name}</span>
            </div>
        `;
        el.querySelector('.sub-name').onclick = ()=>{
            selectedSubCatalogId = sub.id;
            document.getElementById('inspirationEditor').value = sub.content;
            document.getElementById('saveInspirationBtn').classList.remove('hidden');
            document.getElementById('addPageBtn').classList.remove('hidden');
            renderSubCatalogs();
        };
        list.appendChild(el);
    });
}
function saveInspiration(){
    const cat = inspirations.find(x=>x.id === selectedCatalogId);
    const sub = cat.subCatalogs.find(x=>x.id === selectedSubCatalogId);
    sub.content = document.getElementById('inspirationEditor').value;
    localStorage.setItem('inspirations', JSON.stringify(inspirations));
    alert('✨ 保存成功！');
}
function addPage(){
    const ed = document.getElementById('inspirationEditor');
    ed.value += '\n\n—— 第 '+ (ed.value.split('——').length+1) + ' 页 ——\n\n';
}

// ========== 导出 ==========
function openExportModal(t){

    document.getElementById('exportModal').classList.remove('hidden');
}
function exportSelectedContent(){
    const data = {
        dailyLogs: JSON.parse(localStorage.getItem('dailyLogs')||'[]'),
        inspirations: JSON.parse(localStorage.getItem('inspirations')||'[]')
    };

}
function openCloudModal(){
    document.getElementById('cloudModal').classList.remove('hidden');
}

// ========== 【核心修复】云端同步：100% 能读到数据 ==========
async function cloudBackup(){
    const token = document.getElementById('ghToken').value.trim();
    if(!token) return alert('请输入 GitHub Token');

    const fullData = {
        dailyLogs: JSON.parse(localStorage.getItem('dailyLogs')) || [],
        inspirations: JSON.parse(localStorage.getItem('inspirations')) || []
    };

    try {
        // 上传到 Gist
        const res = await fetch('https://api.github.com/gists', {
            method: 'POST',
            headers: { Authorization: `token ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify({
                public: false,
                files: { [CLOUD_FILENAME]: { content: JSON.stringify(fullData, null, 2) } }
            })
        });
        const result = await res.json();
        // 保存 gist _id，这是关键！！！
        localStorage.setItem('gist_id', result.id);
        alert('✅ 全量备份成功！换设备粘贴同一 Token 即可恢复');
    } catch(e) {
        alert('❌ 备份失败：'+ e.message);
    }
}

async function cloudRestore(){
    const token = document.getElementById('ghToken').value.trim();
    const gistId = localStorage.getItem('gist_id');
    if(!token || !gistId) return alert('请先在一台设备上完成备份！');

    try {
        // 直接用 gist_id 读取，绝对精准
        const res = await fetch(`https://api.github.com/gists/${gistId}`, {
            headers: { Authorization: `token ${token}` }
        });
        const gist = await res.json();
        const json = JSON.parse(gist.files[CLOUD_FILENAME].content);

        // 覆盖本地
        localStorage.setItem('dailyLogs', JSON.stringify(json.dailyLogs || []));
        localStorage.setItem('inspirations', JSON.stringify(json.inspirations || []));

        alert('✅ 恢复成功！即将刷新');
        location.reload();
    } catch(e) {
        alert('❌ 恢复失败：'+ e.message);
    }
}
